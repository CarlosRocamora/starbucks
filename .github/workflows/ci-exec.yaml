name: 'Todos os tipos de execução'

on:
  workflow_dispatch:

  push:
    branches: [main, feature/new-tests]

  schedule:
    - cron: '*/30 * * * *'

jobs:

  inspecao:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando dependências
        run: npm ci
      
      - name: Inspeção de Código
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando dependências
        run: npm ci

      - name: Rodando testes unitários com relatório
        run: npx mocha --reporter mochawesome

      - name: Publicando relatório
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatorio-Testes
          path: ./mochawesome-report

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Simulação de deploy
        run: echo 'Deploy sendo realizado...'